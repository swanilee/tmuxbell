<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sgtmux</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <header class="brand">
        <div class="brand-mark" aria-hidden="true">🔔</div>
        <div class="brand-name">tmuxbell</div>
        <div class="brand-host" id="host">—</div>
      </header>
      <div class="eyebrow">SESSIONS</div>
      <ul class="session-list" id="sessionList"></ul>
      <button class="btn-primary" id="newSessionBtn">+ 새 세션</button>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar-title" id="currentSession">세션을 선택하세요</div>
        <div class="topbar-actions">
          <button class="btn-tertiary" id="newWindowBtn" hidden>+ 새 윈도우</button>
          <button class="btn-tertiary" id="killBtn" hidden>세션 종료</button>
        </div>
      </header>
      <div id="mainContent" class="empty-state">
        <div class="empty-state-card">
          <h2 class="empty-state-title">왼쪽에서 세션을 선택하거나 새로 만드세요</h2>
          <p class="empty-state-body">
            터미널에서 <code>sgtmux</code> 명령으로 새 tmux 세션을 시작할 수 있습니다.<br />
            세션 점이 <strong>녹색</strong>이면 응답 대기 중, <strong>분홍</strong>이면 작업 중입니다.
          </p>
        </div>
      </div>
    </main>
  </div>

  <!-- New window modal -->
  <div id="newWindowModal" class="modal" hidden>
    <div class="modal-backdrop" data-modal-close></div>
    <div class="modal-card">
      <div class="eyebrow">새 윈도우 추가</div>
      <label class="field">
        <span class="field-label">윈도우 이름 (선택)</span>
        <input type="text" id="newWindowName" placeholder="예: tests" class="text-input" />
      </label>
      <label class="field-checkbox">
        <input type="checkbox" id="newWindowFork" checked />
        <span>현재 윈도우의 작업 디렉토리(CWD) 이어받기</span>
      </label>
      <label class="field">
        <span class="field-label">새 윈도우에서 실행할 명령 (선택)</span>
        <input type="text" id="newWindowCmd" placeholder="비워두면 claude. 예: bash, htop, vim foo.py" class="text-input" />
        <span class="field-help">새 윈도우가 열리면 이 명령이 자동 실행됩니다. 그냥 셸이 필요하면 <code>bash</code>.</span>
      </label>
      <div class="modal-actions">
        <button class="btn-tertiary" data-modal-close>취소</button>
        <button class="btn-primary" id="newWindowCreate">생성</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script src="/app.js"></script>
</body>
</html>
