<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tmuxbell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <header class="brand">
        <div class="brand-mark" aria-hidden="true">🔔</div>
        <div class="brand-name">tmuxbell</div>
        <div class="brand-host" id="host">—</div>
      </header>
      <div class="eyebrow" data-i18n="sidebar.sessions">SESSIONS</div>
      <ul class="session-list" id="sessionList"></ul>
      <button class="btn-primary" id="newSessionBtn" data-i18n="sidebar.new">+ New session</button>
      <div class="lang-switcher" id="langSwitcher">
        <button class="lang-btn" type="button" data-lang="en">EN</button>
        <button class="lang-btn" type="button" data-lang="ko">한</button>
        <button class="lang-btn" type="button" data-lang="zh">中</button>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar-title" id="currentSession" data-i18n="topbar.placeholder">Select a session</div>
        <div class="topbar-actions">
          <button class="btn-tertiary" id="newWindowBtn" hidden data-i18n="topbar.new_window">+ New window</button>
          <button class="btn-tertiary" id="killBtn" hidden data-i18n="topbar.kill_session">Kill session</button>
        </div>
      </header>
      <div id="mainContent" class="empty-state">
        <div class="empty-state-card">
          <h2 class="empty-state-title" data-i18n="empty.title">Pick a session on the left or create a new one</h2>
          <p class="empty-state-body" data-i18n="empty.body">
            Run <code>tmuxbell</code> in a terminal to start a new tmux session.
          </p>
        </div>
      </div>
    </main>
  </div>

  <!-- New window modal -->
  <div id="newWindowModal" class="modal" hidden>
    <div class="modal-backdrop" data-modal-close></div>
    <div class="modal-card">
      <div class="eyebrow" data-i18n="modal.title">New window</div>
      <label class="field">
        <span class="field-label" data-i18n="modal.name_label">Window name (optional)</span>
        <input type="text" id="newWindowName" data-i18n-placeholder="modal.name_placeholder" class="text-input" />
      </label>
      <label class="field-checkbox">
        <input type="checkbox" id="newWindowFork" checked />
        <span data-i18n="modal.fork_cwd">Inherit current working directory (CWD)</span>
      </label>
      <label class="field">
        <span class="field-label" data-i18n="modal.cmd_label">Command to run in the new window (optional)</span>
        <input type="text" id="newWindowCmd" data-i18n-placeholder="modal.cmd_placeholder" class="text-input" />
        <span class="field-help" data-i18n="modal.cmd_help">This command auto-runs when the window opens.</span>
      </label>
      <div class="modal-actions">
        <button class="btn-tertiary" data-modal-close data-i18n="modal.cancel">Cancel</button>
        <button class="btn-primary" id="newWindowCreate" data-i18n="modal.create">Create</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script src="/i18n.js"></script>
  <script src="/app.js"></script>
</body>
</html>
